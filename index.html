<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12-Week Playbook</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; }
        .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 1.3rem; margin: 0 0 5px 0; color: var(--primary); }
        h2 { font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-top: 0; }
        .meta { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
        .setup-row { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8rem; }
        .section-title { font-weight: bold; color: var(--accent); margin-top: 12px; display: block; font-size: 0.9rem; }
        .video-btn { display: inline-block; background: #e74c3c; color: white; padding: 14px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; margin-top: 8px; width: 100%; text-align: center; box-sizing: border-box; font-weight: bold; }
        .check-item { display: flex; align-items: center; margin: 10px 0; font-size: 0.9rem; line-height: 1.3; }
        input[type="checkbox"] { margin-right: 12px; min-width: 26px; min-height: 26px; }
        input[type="date"] { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; width: 100%; box-sizing: border-box; margin-top: 5px; background: white; }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <h1 id="today-header">Welcome</h1>
            <p class="meta" id="program-status">Starting March 30th...</p>
            <div class="setup-row">
                <label><b>Start Date (Day 1):</b></label>
                <input type="date" id="start-date-input" onchange="updateStartDate(this.value)">
            </div>
        </div>
        <div id="main-content">
            <div class="card">
                <h2>🏋️ Today's Workout</h2>
                <div id="exercise-content"></div>
            </div>
            <div class="card">
                <h2>🍽️ Nutrition (Day <span id="diet-day-num"></span>)</h2>
                <span class="section-title">Breakfast:</span>
                <p style="font-size: 0.85rem; margin: 5px 0; color: #555;">Yogurt/Walnuts, 3 Eggs/Spinach, or Whey Smoothie</p>
                <span class="section-title">Lunch:</span>
                <p id="lunch-text" style="margin: 5px 0; font-weight: 500;"></p>
                <span class="section-title">Dinner:</span>
                <p id="dinner-text" style="margin: 5px 0; font-weight: 500;"></p>
            </div>
            <div class="card">
                <h2>💊 Supplements</h2>
                <div class="check-item"><input type="checkbox"> <b>AM:</b> Aspirin (100mg), Candesartan, Multi, Omega-3</div>
                <div class="check-item"><input type="checkbox"> <b>Lunch:</b> Creatine (3-5g)</div>
                <div class="check-item"><input type="checkbox"> <b>Post:</b> Whey Protein (1 scoop)</div>
                <div class="check-item"><input type="checkbox"> <b>PM:</b> Magnesium Glycinate</div>
            </div>
        </div>
    </div>
    <script>
        const workouts = {
            A: [
                { name: "Sit-to-Stand (Chair Squat)", reps: "6-10", id: "kQCXxXgza_s" },
                { name: "Dumbbell Floor Press", reps: "6-10", id: "T0Y3OBF1bNI" },
                { name: "One-Arm Dumbbell Row", reps: "8-12", id: "ZRSGpBUVcNw" },
                { name: "Dumbbell Romanian Deadlift", reps: "6-10", id: "hQgFixeXdZo" },
                { name: "Standing Dumbbell Curl", reps: "8-12", id: "av7-8igSXTs" },
                { name: "Chair-Supported Calf Raises", reps: "10-15", id: "7FlkNiSW1WA" }
            ],
            B: [
                { name: "Step-Back (Reverse) Lunge", reps: "6-8 per leg", id: "38xlLGfguz4" }, 
                { name: "Seated DB Overhead Press", reps: "6-10", id: "-Xa2xYhPl-0" },
                { name: "Chest-Supported DB Row", reps: "8-12", id: "ZRSGpBUVcNw" },
                { name: "Glute Bridge", reps: "8-12", id: "nuapk_-Q2BI" },
                { name: "Farmer Carry", reps: "20-60 sec", id: "7mzKcADa46c" }
            ]
        };
        const dietRotation = [
            { l: "Lentil salad", d: "Sardines + quinoa + vegetables" },
            { l: "Chickpea bowl", d: "Chicken + broccoli + sweet potato" },
            { l: "Chicken salad", d: "Cod + greens + brown rice" },
            { l: "White bean soup", d: "Turkey + mixed vegetables" },
            { l: "Egg/sardine salad", d: "Trout or mackerel + asparagus + quinoa" },
            { l: "Hummus & veg", d: "Lean beef + roasted vegetables" },
            { l: "Leftovers", d: "Plant-based lentil/bean stew" },
            { l: "Greek salad w/ chickpeas", d: "Skinless chicken thighs + vegetables" },
            { l: "Lentil soup", d: "Haddock/pollock + greens + potatoes" },
            { l: "Sardines on whole-grain toast", d: "Turkey + zucchini + brown rice" },
            { l: "Bean & avocado salad", d: "Mackerel + Brussels sprouts + quinoa" },
            { l: "Leftover fish salad", d: "Pork tenderloin + vegetables" },
            { l: "Egg salad", d: "Cod or tilapia + greens" },
            { l: "Soup/leftovers", d: "Plant-based beans, lentils & vegetables" }
        ];
        function init() {
            let start = localStorage.getItem('startDate') || "2026-03-30";
            document.getElementById('start-date-input').value = start;
            const startDate = new Date(start + "T00:00:00");
            const now = new Date();
            now.setHours(0,0,0,0);
            const diffTime = now - startDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('today-header').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
            if (diffDays < 0) {
                document.getElementById('program-status').innerText = `Starts in ${Math.abs(diffDays)} days (March 30)`;
                document.getElementById('main-content').style.display = "none";
                return;
            }
            document.getElementById('main-content').style.display = "block";
            const currentWeek = Math.floor(diffDays / 7) + 1;
            const dayOfWeek = new Date().getDay(); 
            const dietIndex = diffDays % 14;
            document.getElementById('program-status').innerText = `Week ${currentWeek} | Day ${diffDays + 1}`;
            document.getElementById('diet-day-num').innerText = dietIndex + 1;
            document.getElementById('lunch-text').innerText = dietRotation[dietIndex].l;
            document.getElementById('dinner-text').innerText = dietRotation[dietIndex].d;
            let workoutType = (currentWeek % 2 !== 0) ? ([1,3,5].includes(dayOfWeek) ? (dayOfWeek === 3 ? 'B' : 'A') : 'Rest') : ([1,3,5].includes(dayOfWeek) ? (dayOfWeek === 3 ? 'A' : 'B') : 'Rest');
            let html = "";
            if (workoutType === 'Rest') {
                if ([2,4].includes(dayOfWeek)) {
                    html = `<p><b>Recovery Day:</b> Chair Yoga + Walk.</p>
                            <a href="https://www.youtube.com/watch?v=3HNMPNuXinl" target="_blank" class="video-btn">Watch Yoga (15m)</a>`;
                } else { html = `<p><b>Active Recovery:</b> 20-45 min Walk.</p>`; }
            } else {
                html = `<p style="margin-bottom:10px; color: #777;">Workout ${workoutType} (Phase ${Math.ceil(currentWeek/2)})</p>`;
                workouts[workoutType].forEach(ex => {
                    html += `<div style="margin-bottom:25px; border-left: 5px solid var(--accent); padding-left:15px;"><b>${ex.name}</b> (${ex.reps})<br><a href="https://www.youtube.com/watch?v=${ex.id}" target="_blank" class="video-btn">Watch Form Video</a></div>`;
                });
            }
            document.getElementById('exercise-content').innerHTML = html;
        }
        function updateStartDate(val) { localStorage.setItem('startDate', val); init(); }
        init();
    </script>
</body>
</html>
