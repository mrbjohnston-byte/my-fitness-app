<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrack Canada</title>
    <style>
        :root { --pixel-blue: #4285F4; --bg: #f8f9fa; --canada-red: #d52b1e; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .protein-main { font-size: 3rem; font-weight: bold; color: var(--canada-red); text-align: center; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-search { background: var(--pixel-blue); color: white; }
        .result-box { background: #fff5f5; border: 1px solid var(--canada-red); padding: 15px; border-radius: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="protein-main" id="total-display">0g</div>
    <p style="text-align:center; color: #666;">Daily Protein (Canada CNF)</p>
</div>

<div class="card">
    <h3>Search Canadian Foods</h3>
    <input type="text" id="food-input" placeholder="e.g. Salmon, Atlantic">
    <button class="btn btn-search" id="search-btn" onclick="searchCNF()">Search Health Canada</button>
    
    <div id="result-info" class="result-box">
        <p id="found-text"></p>
        <button class="btn" style="background:var(--canada-red); color:white;" onclick="confirmAdd()">Add 100g serving</button>
    </div>
</div>

<div class="card">
    <h3>Today's History</h3>
    <div id="history-log"></div>
    <button class="btn" style="background:#eee;" onclick="resetDay()">Reset Day</button>
</div>

<script>
    let total = parseFloat(localStorage.getItem('pro_total')) || 0;
    let history = JSON.parse(localStorage.getItem('pro_history')) || [];
    let pendingProtein = 0;
    let pendingName = "";

    function updateUI() {
        document.getElementById('total-display').innerText = total.toFixed(1) + 'g';
        localStorage.setItem('pro_total', total);
        localStorage.setItem('pro_history', JSON.stringify(history));
        renderHistory();
    }

    async function searchCNF() {
        const query = document.getElementById('food-input').value;
        const btn = document.getElementById('search-btn');
        if (!query) return;

        btn.innerText = "Searching Health Canada...";
        
        try {
            // Step 1: Search for the food name
            const searchUrl = `https://food-nutrition.canada.ca/api/canadian-nutrient-file/food/?lang=en&type=json`;
            const response = await fetch(searchUrl);
            const allFoods = await response.json();
            
            // Filter the massive list for your query locally (more reliable than their search endpoint)
            const match = allFoods.find(f => f.food_description.toLowerCase().includes(query.toLowerCase()));
            
            if (match) {
                // Step 2: Get the protein amount (Nutrient ID 203 is Protein in CNF)
                const nutrientUrl = `https://food-nutrition.canada.ca/api/canadian-nutrient-file/nutrientamount/?id=${match.food_code}&lang=en&type=json`;
                const nutrientResponse = await fetch(nutrientUrl);
                const nutrients = await nutrientResponse.json();
                
                const protein = nutrients.find(n => n.nutrient_name_id === 203);
                
                if (protein) {
                    pendingProtein = protein.nutrient_value; // Per 100g
                    pendingName = match.food_description;
                    
                    document.getElementById('found-text').innerHTML = 
                        `<b>Found:</b> ${pendingName}<br><b>Protein:</b> ${pendingProtein.toFixed(1)}g per 100g`;
                    document.getElementById('result-info').style.display = 'block';
                }
            } else {
                alert("Food not found in Canadian database. Try something like 'Beef' or 'Yogurt'.");
            }
        } catch (e) {
            alert("Connection Error: " + e.message);
        } finally {
            btn.innerText = "Search Health Canada";
        }
    }

    function confirmAdd() {
        total += pendingProtein;
        history.unshift({name: pendingName, protein: pendingProtein.toFixed(1), time: new Date().toLocaleTimeString()});
        document.getElementById('result-info').style.display = 'none';
        updateUI();
    }

    function renderHistory() {
        document.getElementById('history-log').innerHTML = history.map(i => `
            <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee;">
                <span>${i.name}</span><b>+${i.protein}g</b>
            </div>
        `).join('');
    }

    function resetDay() { if(confirm("Reset?")) { total = 0; history = []; updateUI(); } }
    updateUI();
</script>
</body>
</html>
