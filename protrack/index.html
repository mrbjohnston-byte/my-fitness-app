<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrack Auto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --pixel-blue: #4285F4; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .protein-main { font-size: 3rem; font-weight: bold; color: var(--pixel-blue); text-align: center; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-magic { background: var(--pixel-blue); color: white; }
        .result-box { background: #e8f0fe; padding: 10px; border-radius: 10px; margin-top: 10px; display: none; }
        .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <div class="protein-main" id="total-display">0g</div>
    <p style="text-align:center; color: #666;">Daily Protein Goal: 160g</p>
</div>

<div class="card">
    <h3>Magic Entry</h3>
    <input type="text" id="magic-input" placeholder="e.g. 1 cup yogurt or 2 eggs">
    <button class="btn btn-magic" id="search-btn" onclick="lookupFood()">Identify & Add</button>
    
    <div id="result-info" class="result-box">
        <p id="found-text"></p>
        <button class="btn" style="background:#34A853; color:white;" onclick="confirmAdd()">Confirm + Add</button>
    </div>
</div>

<div class="card">
    <h3>History</h3>
    <div id="history-log"></div>
    <button class="btn" style="background:#eee; color:#555;" onclick="resetDay()">Reset Day</button>
</div>

<script>
    const API_KEY = 'VVGfHRUrjjfjVdLz9VymkXukK8YX204p6zLhlqhN'; // PASTE YOUR KEY HERE
    let total = parseFloat(localStorage.getItem('pro_total')) || 0;
    let history = JSON.parse(localStorage.getItem('pro_history')) || [];
    let pendingProtein = 0;
    let pendingName = "";

    function updateUI() {
        document.getElementById('total-display').innerText = total.toFixed(1) + 'g';
        localStorage.setItem('pro_total', total);
        localStorage.setItem('pro_history', JSON.stringify(history));
        renderHistory();
    }

    async function lookupFood() {
    const query = document.getElementById('magic-input').value;
    const btn = document.getElementById('search-btn');
    if (!query) return;

    btn.innerText = "Searching...";
    document.getElementById('result-info').style.display = 'none';
    
    try {
        const response = await fetch(`https://api.api-ninjas.com/v1/nutrition?query=${encodeURIComponent(query)}`, {
            method: 'GET',
            headers: { 'X-Api-Key': API_KEY }
        });

        const data = await response.json();
        
        if (data && data.length > 0) {
            let totalP = 0;
            // Loop through each item and ensure it's a valid number
            data.forEach(item => {
                let p = parseFloat(item.protein_g);
                if (!isNaN(p)) {
                    totalP += p;
                }
            });
            
            pendingProtein = totalP;
            pendingName = query;
            
            // Format the display carefully
            const displayProtein = parseFloat(pendingProtein).toFixed(1);
            
            document.getElementById('found-text').innerHTML = 
                `<b>Found:</b> ${query}<br><b>Protein:</b> ${displayProtein}g`;
            document.getElementById('result-info').style.display = 'block';
        } else {
            alert("No data found for that entry.");
        }
    } catch (e) {
        alert("Error: " + e.message);
    } finally {
        btn.innerText = "Identify & Add";
    }
}

    function confirmAdd() {
        total += pendingProtein;
        history.unshift({name: pendingName, protein: pendingProtein.toFixed(1), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        document.getElementById('result-info').style.display = 'none';
        document.getElementById('magic-input').value = '';
        updateUI();
    }

    function renderHistory() {
        document.getElementById('history-log').innerHTML = history.map(i => `
            <div class="history-item">
                <span>${i.name}</span>
                <b>+${i.protein}g</b>
            </div>
        `).join('');
    }

    function resetDay() { if(confirm("Reset?")) { total = 0; history = []; updateUI(); } }

    updateUI();
</script>
</body>
</html>
