<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrack USDA</title>
    <style>
        :root { --pixel-blue: #4285F4; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .protein-main { font-size: 3rem; font-weight: bold; color: var(--pixel-blue); text-align: center; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-magic { background: var(--pixel-blue); color: white; }
        .result-box { background: #e8f0fe; padding: 15px; border-radius: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="protein-main" id="total-display">0g</div>
    <p style="text-align:center; color: #666;">Daily Protein Tracker</p>
</div>

<div class="card">
    <h3>Search Food</h3>
    <input type="text" id="magic-input" placeholder="e.g. Chicken breast or Greek yogurt">
    <button class="btn btn-magic" id="search-btn" onclick="lookupUSDA()">Search Database</button>
    
    <div id="result-info" class="result-box">
        <p id="found-text"></p>
        <button class="btn" style="background:#34A853; color:white;" onclick="confirmAdd()">Add 100g serving</button>
    </div>
</div>

<div class="card">
    <h3>History</h3>
    <div id="history-log"></div>
    <button class="btn" style="background:#eee; color:#555;" onclick="resetDay()">Reset Day</button>
</div>

<script>
    const API_KEY = 'GYd5z87uP8FNk06ehccHtccbwmPWhBjKWPA2POIY'; // PASTE YOUR KEY HERE

    let total = parseFloat(localStorage.getItem('pro_total')) || 0;
    let history = JSON.parse(localStorage.getItem('pro_history')) || [];
    let pendingProtein = 0;
    let pendingName = "";

    function updateUI() {
        document.getElementById('total-display').innerText = total.toFixed(1) + 'g';
        localStorage.setItem('pro_total', total);
        localStorage.setItem('pro_history', JSON.stringify(history));
        renderHistory();
    }

    async function lookupUSDA() {
        const query = document.getElementById('magic-input').value;
        const btn = document.getElementById('search-btn');
        if (!query) return;

        btn.innerText = "Searching...";
        document.getElementById('result-info').style.display = 'none';

        try {
            // We search across all data types (Branded, Foundation, SR Legacy)
            const url = `https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${API_KEY}&query=${encodeURIComponent(query)}&pageSize=1`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.foods && data.foods.length > 0) {
                const food = data.foods[0];
                
                // Find protein in the nutrients array
                // The nutrientName is usually "Protein"
                const proteinObj = food.foodNutrients.find(n => 
                    n.nutrientName.toLowerCase() === 'protein' || n.nutrientId === 1003
                );

                if (proteinObj) {
                    pendingProtein = parseFloat(proteinObj.value);
                    pendingName = food.description;

                    document.getElementById('found-text').innerHTML = 
                        `<b>Found:</b> ${pendingName}<br><b>Protein:</b> ${pendingProtein.toFixed(1)}g (per 100g)`;
                    document.getElementById('result-info').style.display = 'block';
                } else {
                    alert("Found the food, but couldn't find protein data.");
                }
            } else {
                alert("No results found. Try 'Chicken breast' or 'Greek yogurt'.");
            }
        } catch (e) {
            alert("Connection Error: " + e.message);
        } finally {
            btn.innerText = "Search Database";
        }
    }

    function confirmAdd() {
        total += pendingProtein;
        history.unshift({
            name: pendingName, 
            protein: pendingProtein.toFixed(1), 
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        document.getElementById('result-info').style.display = 'none';
        document.getElementById('magic-input').value = '';
        updateUI();
    }

    function renderHistory() {
        document.getElementById('history-log').innerHTML = history.map(i => `
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
                <span>${i.name} (${i.time})</span><b>+${i.protein}g</b>
            </div>
        `).join('');
    }

    function resetDay() { if(confirm("Reset everything?")) { total = 0; history = []; updateUI(); } }

    updateUI();
</script>
</body>
</html>
